<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Сабақ кестесі</title>
    <style>
        table {
            width: 80%;
            border-collapse: collapse;
            margin: 20px 0;
            font-family: sans-serif;
        }
        th, td {
            border: 1px solid #333;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f4f4f4;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        h2 {
            color: #2c3e50;
        }
    </style>
</head>
<body>

    <h2>Менің сабақ кестесін</h2>

    <table>
        <thead>
            <tr>
                <th>Уақыты</th>
                <th>Дүйсенбі</th>
                <th>Сейсенбі</th>
                <th>Сәрсенбі</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>08:30 - 09:15</td>
                <td>Қазақ тілі</td>
                <td>Математика</td>
                <td>Информатика</td>
            </tr>
            <tr>
                <td>09:25 - 10:10</td>
                <td>Геометрия</td>
                <td>Физика</td>
                <td>Тарих</td>
            </tr>
            <tr>
                <td>10:20 - 11:05</td>
                <td>Ағылшын тілі</td>
                <td>Биология</td>
                <td>Дене шынықтыру</td>
            </tr>
        </tbody>
    </table>

    <br>
    <a href="index.html">Басты бетке қайту</a>

</body>
</html>
